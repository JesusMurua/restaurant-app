<div class="login-page">

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="login-header__logo" aria-hidden="true">
        <i class="pi pi-lock"></i>
      </div>
      <h1 class="login-header__title">Iniciar sesión</h1>
      <p class="login-header__subtitle">Acceso para administradores</p>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="submit()">

      <div class="login-field">
        <label for="email">Correo electrónico</label>
        <input
          [(ngModel)]="email"
          name="email"
          id="email"
          type="email"
          pInputText
          placeholder="correo@ejemplo.com"
          autocomplete="email"
        />
      </div>

      <div class="login-field">
        <label for="password">Contraseña</label>
        <p-password
          [(ngModel)]="password"
          name="password"
          inputId="password"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="Tu contraseña"
          autocomplete="current-password"
        />
      </div>

      @if (hasError()) {
        <p class="login-error">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        class="login-submit"
        [disabled]="!email || !password || isLoading()"
      >
        @if (isLoading()) {
          <i class="pi pi-spinner pi-spin"></i>
        } @else {
          <i class="pi pi-sign-in"></i>
        }
        <span>Iniciar sesión</span>
      </button>

    </form>

    <!-- Back to PIN -->
    <a routerLink="/pin" class="login-back-link">
      <i class="pi pi-arrow-left"></i>
      <span>Volver al PIN</span>
    </a>

  </div>

</div>
