<div class="kds">

  <!-- Header -->
  <header class="kds-header">
    <div class="kds-header__brand">
      <div class="kds-header__logo" aria-hidden="true">
        <i class="pi pi-box"></i>
      </div>
      <span class="kds-header__title">Cocina</span>
    </div>
    <span class="kds-header__clock">{{ now() | date:'HH:mm:ss' }}</span>
  </header>

  <!-- Order grid -->
  @if (activeOrders().length > 0) {
    <div class="kds-grid">
      @for (order of activeOrders(); track order.id) {
        <app-kitchen-order-card
          [order]="order"
          [now]="now()"
          [isFading]="isFading(order.id)"
          (markDone)="onMarkDone($event)"
        />
      }
    </div>
  } @else {
    <div class="kds-empty">
      <i class="pi pi-check-circle"></i>
      <p>Sin órdenes pendientes</p>
    </div>
  }

</div>
