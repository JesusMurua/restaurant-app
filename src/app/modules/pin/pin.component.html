<div class="pin-page">

  <div class="pin-card">

    <!-- Title -->
    <div class="pin-header">
      <div class="pin-header__logo" aria-hidden="true">
        <i class="pi pi-lock"></i>
      </div>
      <h1 class="pin-header__title">Ingresa tu PIN</h1>
      <p class="pin-header__subtitle">PIN de 4 dígitos para acceder</p>
    </div>

    <!-- Dots display -->
    <div
      class="pin-dots"
      [class.pin-dots--error]="hasError()"
      aria-label="PIN ingresado"
      aria-live="polite"
    >
      @for (i of [0, 1, 2, 3]; track i) {
        <span class="pin-dot" [class.pin-dot--filled]="digits().length > i"></span>
      }
    </div>

    @if (hasError()) {
      <p class="pin-error">PIN incorrecto. Intenta de nuevo.</p>
    }

    <!-- Numpad 3x4 -->
    <div class="pin-numpad" role="group" aria-label="Teclado numérico">
      @for (key of keys; track $index) {
        @if (key === null) {
          <span class="pin-key pin-key--empty"></span>
        } @else if (key === 'del') {
          <button
            type="button"
            class="pin-key pin-key--del"
            aria-label="Borrar último dígito"
            [disabled]="isLoading()"
            (click)="removeDigit()"
          >
            <i class="pi pi-delete-left"></i>
          </button>
        } @else {
          <button
            type="button"
            class="pin-key"
            [attr.aria-label]="'Dígito ' + key"
            [disabled]="isLoading()"
            (click)="addDigit(key)"
          >
            {{ key }}
          </button>
        }
      }
    </div>

    <!-- Owner login link -->
    <a routerLink="/login" class="pin-owner-link">
      ¿Eres el dueño? Iniciar sesión
    </a>

  </div>

</div>
